{% extends "base.html" %}

{% block title %}Image converter{% endblock %}

{% block content %}
<div class="convert-page">
  <div class="hero-card">
    <h1>Image converter</h1>
    <p>Convert uploaded images directly in your browser and download the result.</p>
  </div>

  <div class="convert-card">
    <label for="image-upload">Choose image</label>
    <input id="image-upload" type="file" accept="image/*" />

    <label for="format-select">Target format</label>
    <select id="format-select">
      <option value="png">PNG</option>
      <option value="jpg">JPG</option>
      <option value="jpeg">JPEG</option>
      <option value="webp">WEBP</option>
      <option value="bmp">BMP</option>
      <option value="gif">GIF</option>
    </select>

    <div class="actions-row">
      <button id="convert-btn" type="button">Convert</button>
      <button id="clear-btn" type="button" class="btn-secondary">Remove file</button>
    </div>

    <div id="file-info" class="file-info hidden"></div>
    <div id="status" class="status"></div>
  </div>

  <div class="preview-grid">
    <div class="preview-card">
      <h3>Original</h3>
      <img id="original-preview" class="hidden" alt="Original preview" />
    </div>
    <div class="preview-card">
      <h3>Converted</h3>
      <img id="converted-preview" class="hidden" alt="Converted preview" />
      <div class="download-row">
        <a id="download-link" class="btn download-btn hidden" href="#" download>Download final file</a>
      </div>
    </div>
  </div>
</div>

<script>
  const uploadInput = document.getElementById('image-upload');
  const formatSelect = document.getElementById('format-select');
  const convertButton = document.getElementById('convert-btn');
  const clearButton = document.getElementById('clear-btn');
  const status = document.getElementById('status');
  const fileInfo = document.getElementById('file-info');
  const originalPreview = document.getElementById('original-preview');
  const convertedPreview = document.getElementById('converted-preview');
  const downloadLink = document.getElementById('download-link');

  let selectedFile = null;
  let objectUrl = null;

  function shortenName(name, maxLength = 20) {
    if (!name) return '';
    if (name.length <= maxLength) return name;
    const ext = name.includes('.') ? name.slice(name.lastIndexOf('.')) : '';
    const base = name.slice(0, name.lastIndexOf('.')) || name;
    const shortenedBase = base.slice(0, Math.max(1, maxLength - ext.length - 1));
    return `${shortenedBase}…${ext}`;
  }

  function updateFileInfo() {
    if (!selectedFile) {
      fileInfo.classList.add('hidden');
      fileInfo.textContent = '';
      return;
    }
    const sizeInMB = (selectedFile.size / (1024 * 1024)).toFixed(2);
    fileInfo.textContent = `${shortenName(selectedFile.name)} • ${selectedFile.type || 'image'} • ${sizeInMB} MB`;
    fileInfo.classList.remove('hidden');
  }

  function resetConvertedPreview() {
    if (objectUrl) {
      URL.revokeObjectURL(objectUrl);
      objectUrl = null;
    }
    convertedPreview.classList.add('hidden');
    convertedPreview.removeAttribute('src');
    downloadLink.classList.add('hidden');
    downloadLink.removeAttribute('href');
    downloadLink.removeAttribute('download');
  }

  uploadInput.addEventListener('change', () => {
    const file = uploadInput.files[0];
    if (!file) {
      selectedFile = null;
      originalPreview.classList.add('hidden');
      originalPreview.removeAttribute('src');
      updateFileInfo();
      resetConvertedPreview();
      status.textContent = '';
      return;
    }

    selectedFile = file;
    const reader = new FileReader();
    reader.onload = (event) => {
      originalPreview.src = event.target.result;
      originalPreview.classList.remove('hidden');
    };
    reader.readAsDataURL(file);
    updateFileInfo();
    resetConvertedPreview();
    status.textContent = 'Ready to convert.';
  });

  clearButton.addEventListener('click', () => {
    selectedFile = null;
    uploadInput.value = '';
    originalPreview.classList.add('hidden');
    originalPreview.removeAttribute('src');
    updateFileInfo();
    resetConvertedPreview();
    status.textContent = 'Removed.';
  });

  convertButton.addEventListener('click', async () => {
    if (!selectedFile) {
      status.textContent = 'Please choose an image first.';
      return;
    }

    status.textContent = 'Converting...';
    resetConvertedPreview();

    const format = formatSelect.value;
    const image = await createImageBitmap(selectedFile);
    const canvas = document.createElement('canvas');
    canvas.width = image.width;
    canvas.height = image.height;
    const context = canvas.getContext('2d');
    context.drawImage(image, 0, 0);

    const mimeType = format === 'jpg' || format === 'jpeg' ? 'image/jpeg' : format === 'png' ? 'image/png' : format === 'webp' ? 'image/webp' : format === 'bmp' ? 'image/bmp' : format === 'gif' ? 'image/gif' : 'image/png';

    const blob = await new Promise((resolve) => canvas.toBlob(resolve, mimeType));
    if (!blob) {
      status.textContent = 'Conversion failed.';
      return;
    }

    objectUrl = URL.createObjectURL(blob);
    convertedPreview.src = objectUrl;
    convertedPreview.classList.remove('hidden');
    downloadLink.href = objectUrl;
    downloadLink.download = `converted.${format}`;
    downloadLink.classList.remove('hidden');
    status.textContent = 'Done.';
  });
</script>
{% endblock %}
